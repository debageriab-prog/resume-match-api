services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-match-db
    environment:
      POSTGRES_DB: ${DB_NAME:-resume_match}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-resume_match}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  resume-match-api:
    build: .
    image: resume-match-api:latest
    container_name: resume-match-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-resume_match}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Server
      SERVER_PORT: 8080
      # Logging — DEBUG, INFO, WARNING, ERROR
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # CORS (comma-separated or wildcard)
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
